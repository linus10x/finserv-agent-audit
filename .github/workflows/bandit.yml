name: Bandit SAST

# Python-specific SAST. Emits SARIF and uploads to GitHub code-scanning so
# findings live alongside CodeQL in the Security tab. Non-blocking on first
# run (`|| true`) — future PR will tighten to fail-on-medium once baseline
# is triaged.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

concurrency:
  group: bandit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bandit:
    name: Bandit SAST scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.13"

      - name: Install bandit (with SARIF formatter)
        run: |
          python -m pip install --upgrade pip
          # `bandit[sarif]` pulls in the `bandit-sarif-formatter` plugin. Without
          # it, `bandit -f sarif` silently produces no SARIF file and the
          # upload-sarif step errors with "Path does not exist: bandit.sarif".
          pip install "bandit[sarif,toml]>=1.7" bandit-sarif-formatter

      - name: Run bandit (SARIF)
        run: |
          # Pre-touch so the upload step never sees a missing-file error if
          # bandit crashes after install but before write.
          : > bandit.sarif
          bandit -r src/finserv_agent_audit/ -ll -f sarif -o bandit.sarif || true
          # If bandit produced an empty file (zero-finding edge cases), drop
          # in a minimal valid SARIF skeleton so upload-sarif accepts it.
          if [ ! -s bandit.sarif ]; then
            cat > bandit.sarif <<'JSON'
          {
            "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json",
            "version": "2.1.0",
            "runs": [
              {
                "tool": { "driver": { "name": "bandit", "informationUri": "https://bandit.readthedocs.io/" } },
                "results": []
              }
            ]
          }
          JSON
          fi

      - name: Upload SARIF to GitHub code-scanning
        uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57  # v3.36.0
        with:
          sarif_file: bandit.sarif
          category: bandit
