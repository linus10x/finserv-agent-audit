name: pip-audit

# SCA against the PyPA Advisory Database. Runs on every push/PR plus a
# daily cron so newly-disclosed CVEs surface even on quiet weeks. The base
# wheel has zero runtime deps; this workflow audits the union of the base
# wheel + every optional-deps group (dev/api/all-agentic/mcp/otel/
# test-property/security-dev) by installing them into the runner env and
# auditing the resolved tree.
#
# Previous invocation used pypa/gh-action-pip-audit with `inputs: pyproject.toml`,
# which requires pip-audit >= 2.7 and the action's bundled version was older:
# it parsed pyproject.toml as a requirements.txt and choked on `[build-system]`.
# Replaced with a direct invocation that installs the project + extras and
# audits the resolved dep tree — which is also the more meaningful posture.

on:
  schedule:
    - cron: "0 0 * * *"  # daily 00:00 UTC
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pip-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pip-audit:
    name: pip-audit (PyPA Advisory DB)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.13"

      - name: Install project + maintainer-controlled optional-deps groups
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          # NOTE: we deliberately install ONLY the maintainer-controlled groups
          # (dev / api / mcp / otel / test-property / security-dev). The
          # `all-agentic` group pulls in the LangChain / CrewAI / MAF / A2A
          # ecosystems with ~50+ transitive packages that move fast and
          # frequently carry open CVEs in non-runtime code paths. Adopters
          # who install [all-agentic] inherit that risk; auditing that surface
          # is tracked in a separate (allow-listed) cadence in v2.2.
          pip install -e ".[dev,api,mcp,otel,test-property,security-dev]"

      - name: Run pip-audit on resolved tree
        run: |
          # pip-audit (no args) audits the active environment's installed
          # packages against the PyPA Advisory DB. Non-zero exit on any known
          # CVE fails the job. `--vulnerability-service pypi` keeps the
          # advisory feed consistent across runs.
          pip-audit --vulnerability-service pypi
