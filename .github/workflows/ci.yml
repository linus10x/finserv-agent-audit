name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install dev + every optional-extras group so mypy --strict sees the real
          # third-party types behind every import-guard. Without the extras installed,
          # `# type: ignore` comments on the import-guard-pattern lines fire
          # `unused-ignore` errors in strict mode (the imports fail silently before
          # the comment can be evaluated, so mypy concludes the comment was
          # unnecessary).
          pip install -e ".[dev,api,all-agentic,mcp,otel,test-property]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy --strict)
        run: mypy --strict src/finserv_agent_audit/ --ignore-missing-imports

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=src/finserv_agent_audit \
            --cov=examples \
            --cov=schemas \
            --cov=patterns \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=90

      - name: Lint (banned terms)
        run: python3 scripts/banned_term_lint.py

      - name: Lint (banned names)
        run: python3 scripts/banned_names_lint.py
        env:
          BANNED_NAMES_FILE: ${{ secrets.BANNED_NAMES_FILE_PATH || '.banned-names.txt' }}

      - name: Lint (tamper language)
        run: python3 scripts/tamper_language_lint.py

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: matrix.python-version == '3.12'
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
          retention-days: 30

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        if: matrix.python-version == '3.12'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: false
