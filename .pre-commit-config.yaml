repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: no-commit-to-branch
        args: [--branch, main]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.0
    hooks:
      - id: mypy
        args: [--strict, --ignore-missing-imports]
        additional_dependencies: []

  # Secret scanner — catches API keys, private keys, cloud creds in diff.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # GitHub Actions linter — catches malformed `uses:`, missing `needs:`,
  # invalid expression syntax before CI ever runs.
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # YAML linter — applies .yamllint.yml ruleset.
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ["-c=.yamllint.yml"]

  # Shell-script static analysis (for scripts/, deploy/, action.yml inline
  # shells). Pinned to the official shellcheck-precommit mirror.
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck

  - repo: local
    hooks:
      - id: banned-term-lint
        name: Banned-term lint (framework voice)
        entry: python3 scripts/banned_term_lint.py
        language: system
        pass_filenames: false
        types_or: [markdown, python]
      - id: banned-names-lint
        name: Banned-names lint (opt-in)
        entry: python3 scripts/banned_names_lint.py
        language: system
        pass_filenames: false
        types_or: [markdown, python]
      - id: tamper-language-lint
        name: Tamper-language lint (must hedge same line)
        entry: python3 scripts/tamper_language_lint.py
        language: system
        pass_filenames: false
        types_or: [markdown, python]
